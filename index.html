<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Code Debugger</title>

<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 12px;
    background: #020617;
    color: #38bdf8;
    font-size: 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.controls {
    display: flex;
    gap: 10px;
}

select, button {
    padding: 8px 12px;
    font-size: 14px;
    border-radius: 6px;
    border: none;
}

button {
    background: #38bdf8;
    cursor: pointer;
}

button:hover {
    background: #0284c7;
}

.container {
    display: flex;
    height: calc(100vh - 60px);
}

#editor {
    width: 65%;
    height: 100%;
}

.output {
    width: 35%;
    background: #020617;
    padding: 15px;
    overflow-y: auto;
}

.output h3 {
    color: #38bdf8;
}

#status {
    font-weight: bold;
    margin-bottom: 10px;
}

.success { color: #22c55e; }
.error { color: #ef4444; }
.warning { color: #facc15; }

pre {
    background: #1e293b;
    padding: 10px;
    border-radius: 8px;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<header>
    <div>🚀 AI Code Debugger</div>

    <div class="controls">
        <select id="lang">
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="cpp">C++</option>
            <option value="java">Java</option>
        </select>

        <button onclick="run()">Debug</button>
    </div>
</header>

<div class="container">
    <div id="editor"></div>

    <div class="output">
        <h3>Output</h3>
        <div id="status"></div>
        <pre id="result"></pre>
    </div>
</div>

<script>
let editor;

// Load Monaco Editor
require.config({
    paths: {
        vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs"
    }
});

require(["vs/editor/editor.main"], function () {
    editor = monaco.editor.create(document.getElementById("editor"), {
        value: "# Write your code here",
        language: "python",
        theme: "vs-dark",
        automaticLayout: true
    });
});

// Change language in editor
document.getElementById("lang").addEventListener("change", function () {
    const lang = this.value;

    const map = {
        python: "python",
        javascript: "javascript",
        cpp: "cpp",
        java: "java"
    };

    monaco.editor.setModelLanguage(editor.getModel(), map[lang]);
});

// Run debugger
async function run() {

    const code = editor.getValue();
    const language = document.getElementById("lang").value;

    const res = await fetch("/debug", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ code, language })
    });

    const data = await res.json();

    let output = "";

    // Status display
    const statusDiv = document.getElementById("status");
    statusDiv.className = "";

    if (data.status === "success") {
        statusDiv.innerText = "SUCCESS";
        statusDiv.classList.add("success");
        output += data.message;
    }

    if (data.status === "error") {
        statusDiv.innerText = "ERROR";
        statusDiv.classList.add("error");
        output += "Message: " + data.error + "\n";
        output += "Line: " + data.line + "\n";
    }

    if (data.status === "warning") {
        statusDiv.innerText = "WARNING";
        statusDiv.classList.add("warning");
        output += data.message;
    }

    // Show auto-fix
    if (data.auto_fix) {
        output += "\n\n--- Suggested Fix ---\n";
        output += data.auto_fix;
    }

    document.getElementById("result").innerText = output;
}
</script>

</body>
</html>
