<!DOCTYPE html>
<html>
<head>
<title>AI Code Debugger</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 15px;
    background: #020617;
    text-align: center;
    font-size: 22px;
    color: #38bdf8;
}

.container {
    display: flex;
    height: 90vh;
}

.editor {
    width: 60%;
    padding: 20px;
}

.output {
    width: 40%;
    background: #020617;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 80%;
    background: #1e293b;
    color: white;
    border: none;
    padding: 10px;
    font-size: 14px;
}

select, button {
    margin-top: 10px;
    padding: 10px;
    font-size: 16px;
}

button {
    background: #38bdf8;
    border: none;
    cursor: pointer;
}

pre {
    white-space: pre-wrap;
}
</style>

</head>

<body>

<header>🚀 AI Code Debugger</header>

<div class="container">

<div class="editor">
<select id="lang">
<option value="python">Python</option>
<option value="javascript">JavaScript</option>
<option value="cpp">C++</option>
<option value="java">Java</option>
</select>

<textarea id="code"></textarea>

<button onclick="run()">Debug Code</button>
</div>

<div class="output">
<h3>Output</h3>
<pre id="result"></pre>
</div>

</div>

<script>
async function run() {
    const code = document.getElementById("code").value;
    const language = document.getElementById("lang").value;

    const res = await fetch("/debug", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ code, language })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
