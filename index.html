<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Code Debugger</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

textarea {
    width: 80%;
    height: 200px;
    background: #1e293b;
    color: white;
    border: none;
    padding: 10px;
    font-size: 14px;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #0284c7;
}

pre {
    background: #1e293b;
    padding: 10px;
    width: 80%;
    margin: auto;
    text-align: left;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<h1>🚀 AI Code Debugger</h1>

<select id="language">
    <option value="python">Python</option>
    <option value="javascript">JavaScript</option>
    <option value="cpp">C++</option>   <!-- MUST be cpp -->
    <option value="java">Java</option>
</select>

<br><br>

<textarea id="code" placeholder="Paste your code here..."></textarea>

<br>

<button onclick="run()">Debug Code</button>

<h3>Output</h3>
<pre id="result"></pre>


<script>
async function run() {

    const code = document.getElementById("code").value;
    const language = document.getElementById("language").value;

    const res = await fetch("/debug", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ code, language })
    });

    const data = await res.json();

    let output = "";

    // ❌ Syntax Error
    if (data.syntax_error) {
        output += "❌ Syntax Error:\n" + data.syntax_error + "\n\n";
    }

    // ✅ General Message
    if (data.message) {
        output += data.message + "\n\n";
    }

    // ⚠ Logical Issues
    if (data.logic && data.logic.length > 0) {
        output += "⚠ Logical Issues:\n" + data.logic.join("\n") + "\n\n";
    }

    // ⚡ Performance
    if (data.performance && data.performance.length > 0) {
        output += "⚡ Performance:\n" + data.performance.join("\n") + "\n\n";
    }

    // 🔒 Security
    if (data.security && data.security.length > 0) {
        output += "🔒 Security:\n" + data.security.join("\n") + "\n\n";
    }

    // 🤖 AI Explanation (ADDED HERE)
    if (data.ai_explanation) {
        output += "🤖 AI Explanation:\n" + data.ai_explanation + "\n\n";
    }

    document.getElementById("result").innerText = output;
}
</script>
</body>
</html>
