<!DOCTYPE html>
<html>
<head>
<title>AI Code Debugger</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

h1 {
    color: #38bdf8;
}

textarea {
    width: 80%;
    height: 200px;
    border-radius: 10px;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0284c7;
}

#result {
    margin-top: 20px;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>🚀 AI Code Debugger</h1>

<textarea id="code" placeholder="Paste your code here..."></textarea>

<br><br>

<button onclick="debug()">Debug Code</button>

<div id="result"></div>

<script>
async function debug() {

    const code = document.getElementById("code").value;

    const res = await fetch("/debug", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ code: code })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
